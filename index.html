<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="coinzilla" content="14ac4ebfedbd33506b96368ec3f29215" />
    <title>CryptoFlow Faucet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #030305; --bg-card: #0f0f14; --accent: #00ff88; --accent-dim: #00cc6a;
            --text-main: #ffffff; --text-muted: #666680; --border: #1a1a24; --danger: #ff3366;
        }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-primary); color: var(--text-main); min-height: 100vh; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); }
        .btn-main { background: linear-gradient(135deg, var(--accent), var(--accent-dim)); color: #000; font-weight: 700; transition: all 0.2s; }
        .btn-main:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; }
        .input-dark:focus { outline: none; border-color: var(--accent); }
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; opacity: 0; transition: all 0.3s; z-index: 9999; }
        #toast.show { opacity: 1; transform: translateY(-10px); }
        .toast-success { background: var(--accent); color: #000; }
        .toast-error { background: var(--danger); color: #fff; }
        .ad-container { background: rgba(0,0,0,0.2); padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body class="antialiased">
    <div class="bg-grid"></div>
    
    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="glass p-8 rounded-2xl w-full max-w-md mx-4">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-center">Start Earning</h2>
            
            <!-- Tabs -->
            <div class="flex mb-6 border-b border-[var(--border)]">
                <button id="tabLogin" class="flex-1 pb-2 border-b-2 border-[var(--accent)] text-[var(--accent)]" onclick="showTab('login')">Login</button>
                <button id="tabReg" class="flex-1 pb-2 border-b-2 border-transparent text-[var(--text-muted)]" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login -->
            <div id="loginTab">
                <div class="mb-4">
                    <label class="text-xs text-[var(--text-muted)] block mb-2">USERNAME</label>
                    <input type="text" id="loginUser" class="w-full p-3 rounded-lg input-dark text-sm" placeholder="Enter username">
                </div>
                <button onclick="login()" class="w-full py-3 rounded-xl font-bold text-lg btn-main">Login</button>
            </div>

            <!-- Register -->
            <div id="registerTab" class="hidden">
                <div class="mb-4">
                    <label class="text-xs text-[var(--text-muted)] block mb-2">USERNAME</label>
                    <input type="text" id="regUser" class="w-full p-3 rounded-lg input-dark text-sm" placeholder="Choose username">
                </div>
                <div class="mb-4">
                    <label class="text-xs text-[var(--text-muted)] block mb-2">FAUCETPAY WALLET (USDT TRC20)</label>
                    <input type="text" id="regWallet" class="w-full p-3 rounded-lg input-dark text-sm mono" placeholder="Your wallet address">
                </div>
                <button onclick="register()" class="w-full py-3 rounded-xl font-bold text-lg btn-main">Create Account</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="relative z-10 min-h-screen flex flex-col" id="mainApp">
        
        <header class="glass border-b border-[var(--border)] sticky top-0 z-40">
            <div class="max-w-4xl mx-auto p-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-[var(--accent)] flex items-center justify-center text-black font-bold">F</div>
                    <span class="font-bold text-lg">CryptoFlow</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-[var(--text-muted)]">User: <span id="headerUser" class="text-white">-</span></span>
                    <button onclick="logout()" class="px-3 py-1 border border-[var(--border)] rounded text-xs">Logout</button>
                </div>
            </div>
        </header>

        <!-- A-ADS -->
        <div class="ad-container">
             <iframe data-aa='2429113' src='//acceptable.a-ads.com/2429113/?size=Adaptive' style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

        <main class="flex-1 max-w-4xl mx-auto w-full p-4 grid lg:grid-cols-3 gap-6 py-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-2xl font-bold mb-1">Claim Free USDT</h2>
                    <p class="text-[var(--text-muted)] mb-6">0.00000021 USDT instant to FaucetPay.</p>

                    <!-- Captcha -->
                    <div class="mb-6 p-4 border border-dashed border-[var(--border)] rounded-lg cursor-pointer hover:border-[var(--accent)] transition-colors" id="captchaBox" onclick="solveCaptcha()">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 border-2 border-[var(--text-muted)] rounded flex items-center justify-center" id="captchaIcon"></div>
                            <span id="captchaText" class="text-[var(--text-muted)]">Click to verify</span>
                        </div>
                    </div>

                    <button id="claimBtn" disabled onclick="claimReward()" class="w-full py-4 rounded-xl font-bold text-lg btn-main opacity-50">
                        CLAIM 0.00000021 USDT
                    </button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass rounded-2xl p-6 text-center">
                    <div class="text-xs text-[var(--text-muted)] mb-1">ACCOUNT BALANCE</div>
                    <div class="text-3xl font-bold mono text-[var(--accent)]" id="balance">0.00000000</div>
                    <div class="text-sm text-[var(--text-muted)]">USDT</div>
                </div>

                <div class="glass rounded-2xl p-6">
                    <h3 class="font-bold mb-3">Referral Program</h3>
                    <div class="text-xs text-[var(--text-muted)] mb-2">Share link and earn:</div>
                    <div class="flex gap-2">
                        <input type="text" readonly id="refLink" class="w-full p-2 rounded input-dark text-xs mono bg-black/50">
                        <button onclick="copyRef()" class="px-3 py-2 bg-white/10 rounded">📋</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="toast"></div>

    <script>
        const API = '/api/claim';
        let user = null;
        let captcha = false;

        function showTab(t) {
            document.getElementById('loginTab').classList.toggle('hidden', t !== 'login');
            document.getElementById('registerTab').classList.toggle('hidden', t !== 'register');
            document.getElementById('tabLogin').classList.toggle('border-[var(--accent)]', t === 'login');
            document.getElementById('tabLogin').classList.toggle('text-[var(--accent)]', t === 'login');
            document.getElementById('tabReg').classList.toggle('border-[var(--accent)]', t === 'register');
            document.getElementById('tabReg').classList.toggle('text-[var(--accent)]', t === 'register');
        }

        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.innerText = msg;
            el.className = `show toast-${type}`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function updateUI() {
            if (!user) return;
            document.getElementById('headerUser').textContent = user.name;
            document.getElementById('balance').textContent = user.balance.toFixed(8);
            document.getElementById('refLink').value = `${window.location.origin}?ref=${user.name}`;
        }

        // --- AUTH (LocalStorage) ---
        function register() {
            const name = document.getElementById('regUser').value.trim();
            const wallet = document.getElementById('regWallet').value.trim();
            if (!name || !wallet) return toast('Fill fields', 'error');
            
            const newUser = { name, wallet, balance: 0, lastClaim: 0 };
            localStorage.setItem('cf_data', JSON.stringify(newUser));
            user = newUser;
            document.getElementById('authModal').classList.add('hidden');
            updateUI();
            toast('Account created!', 'success');
        }

        function login() {
            const name = document.getElementById('loginUser').value.trim();
            if (!name) return toast('Enter username', 'error');
            
            // Try to load existing
            let data = localStorage.getItem('cf_data');
            if (data) {
                user = JSON.parse(data);
                if(user.name !== name) {
                    // If name different, "login" as new user with this name (simplified)
                    user = { name: name, wallet: '', balance: 0, lastClaim: 0 };
                    localStorage.setItem('cf_data', JSON.stringify(user));
                }
            } else {
                user = { name: name, wallet: '', balance: 0, lastClaim: 0 };
                localStorage.setItem('cf_data', JSON.stringify(user));
            }
            
            document.getElementById('authModal').classList.add('hidden');
            updateUI();
            
            if(!user.wallet) {
                // If logged in but no wallet, ask to "register" effectively
                toast('Please register wallet first', 'error');
                showTab('register');
                document.getElementById('authModal').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('cf_data');
            location.reload();
        }

        // --- FAUCET ---
        function solveCaptcha() {
            if (captcha) return;
            captcha = true;
            document.getElementById('captchaIcon').innerHTML = '<svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
            document.getElementById('captchaText').textContent = 'Verified';
            document.getElementById('captchaText').classList.add('text-[var(--accent)]');
            
            const btn = document.getElementById('claimBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }

        async function claimReward() {
            if (!user || !user.wallet) return toast('Wallet not found. Logout and Register.', 'error');
            
            const btn = document.getElementById('claimBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'claim', wallet: user.wallet })
                });
                const data = await res.json();

                if (data.success) {
                    user.balance += 0.00000021;
                    user.lastClaim = Date.now();
                    localStorage.setItem('cf_data', JSON.stringify(user));
                    updateUI();
                    toast('Payment sent! Check FaucetPay.', 'success');
                    btn.textContent = 'CLAIMED (Wait 5m)';
                } else {
                    toast(data.message || 'Error', 'error');
                    btn.textContent = 'TRY AGAIN';
                    btn.disabled = false;
                }
            } catch (e) {
                toast('Server connection error', 'error');
                btn.textContent = 'TRY AGAIN';
                btn.disabled = false;
            }
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('refLink').value);
            toast('Link copied!', 'success');
        }

        // --- INIT ---
        window.onload = () => {
            const saved = localStorage.getItem('cf_data');
            if (saved) {
                user = JSON.parse(saved);
                document.getElementById('authModal').classList.add('hidden');
                updateUI();
            }
        };
    </script>
</body>
</html>
